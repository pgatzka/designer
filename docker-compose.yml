services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: designer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-designer}
      POSTGRES_DB: designer
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U designer -d designer']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    # Or use the published image instead of building:
    # image: ghcr.io/pgatzka/designer:latest
    environment:
      DATABASE_URL: postgres://designer:${POSTGRES_PASSWORD:-designer}@db:5432/designer
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (>=16 chars) in your .env}
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
