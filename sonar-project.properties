# Update these two to match your SonarCloud / SonarQube project before enabling Sonar.
sonar.projectKey=pgatzka_designer
sonar.organization=pgatzka

sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/test
sonar.test.inclusions=**/*.test.ts
sonar.exclusions=**/*.test.ts,**/dist/**,**/coverage/**

# Coverage produced by `npm run test:coverage` (vitest v8 -> lcov) in each workspace.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
