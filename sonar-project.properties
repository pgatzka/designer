# Update these two to match your SonarCloud / SonarQube project before enabling Sonar.
sonar.projectKey=pgatzka_designer
sonar.organization=pgatzka

sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/test
sonar.test.inclusions=**/*.test.ts
sonar.exclusions=**/*.test.ts,**/dist/**,**/coverage/**

# Coverage produced by `npm run test:coverage` (vitest v8 -> lcov) in each workspace.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

# Exclude presentational UI and framework/DB glue from the COVERAGE metric (they are
# still analyzed for bugs & smells). These are verified via the running app / route
# tests rather than unit tests, so counting them as 0% would wrongly fail the gate.
# The unit-tested logic — frontend schema/graph and backend auth — stays measured.
sonar.coverage.exclusions=\
  frontend/src/main.tsx,\
  frontend/src/monacoSetup.ts,\
  frontend/src/App.tsx,\
  frontend/src/components/**,\
  frontend/src/auth/**,\
  backend/src/index.ts,\
  backend/src/app.ts,\
  backend/src/static.ts,\
  backend/src/env.ts,\
  backend/src/db/**

# Test files are intentionally repetitive (arrange/act/assert); don't let that count
# as duplicated code on new code.
sonar.cpd.exclusions=**/*.test.ts

# Block the CI scan on the server-side Quality Gate result, and fail the job
# (and therefore publish-image) if the gate does not pass.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
