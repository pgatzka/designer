name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_ARTIFACT: designer-image
  IMAGE_TAR: designer-image.tar
  LOCAL_IMAGE: designer:ci

jobs:
  verify-formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run format:check

  verify-compilation:
    name: Compilation
    needs: verify-formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build

  verify-typecheck:
    name: Typecheck
    needs: verify-compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  verify-lint:
    name: Lint
    needs: verify-compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run lint

  verify-tests:
    name: Tests
    needs: verify-compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm test

  verify-coverage:
    name: Coverage
    needs: verify-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  verify-sonar:
    name: Sonar
    needs: verify-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for accurate blame/new-code detection
      - name: Download coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage
        continue-on-error: true
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  build-image:
    name: Build image
    needs: verify-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image to tarball
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          outputs: type=docker,dest=/tmp/${{ env.IMAGE_TAR }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT }}
          path: /tmp/${{ env.IMAGE_TAR }}
          retention-days: 1

  publish-image:
    name: Publish image (GHCR)
    needs: [build-image, verify-sonar, verify-lint, verify-typecheck]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_ARTIFACT }}
          path: /tmp
      - name: Load image
        run: docker load --input /tmp/${{ env.IMAGE_TAR }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Tag and push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag"
            docker tag "$LOCAL_IMAGE" "$tag"
            docker push "$tag"
          done
